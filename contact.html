<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact Becker Software — Send a message or schedule a call to discuss your project.">
    <meta property="og:image" content="./assets/images/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
  <title>Contact — Becker</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <div class="loader"><div class="loader__inner"><svg class="loader__logo" viewBox="0 0 32 34" width="60" height="64"><text x="50%" y="50%" dominant-baseline="central" text-anchor="middle" font-family="'Inter', Helvetica, Arial, sans-serif" font-weight="700" font-size="28" fill="currentColor">B</text></svg></div></div>

  <header class="component component--header header">
    <div class="container"><div class="columns --center">
      <div class="columns__item"><a href="/" class="logo"><svg viewBox="0 0 109 34" width="109" height="34"><text x="0" y="25" font-family="'Inter', Helvetica, Arial, sans-serif" font-weight="700" font-size="24" fill="currentColor" letter-spacing="-0.5">BECKER</text></svg></a></div>
      <div class="columns__item nav-desktop"><div class="flex"><a href="/products.html" class="nav-link">Portfolio</a><a href="/company.html" class="nav-link">About</a><a href="/governance.html" class="nav-link">How I Work</a><a href="/sustainability.html" class="nav-link">Tech Stack</a><a href="/talents.html" class="nav-link">Work With Me</a></div></div>
      <div class="group"><button class="menu-toggle" aria-label="Menu"><span></span><span></span><span></span></button></div>
    </div></div>
  </header>

  <main>
    <section class="component component--hero-secondary --dark">
      <div class="container">
        <div class="label" style="opacity:0.6">Contact</div>
        <h1 class="title --xlarge split">Get in touch</h1>
      </div>
    </section>

    <section class="component" style="padding:80px 0;">
      <div class="container">
        <div class="columns" style="gap:60px;">
          <div class="columns__item --half">
            <h2 class="title --medium" style="margin-bottom:32px;">Send us a message</h2>
            <form class="contact-form">
              <input type="text" placeholder="Full name" aria-label="Full name" class="login__input" style="margin-bottom:16px;" />
              <input type="email" placeholder="Email address" aria-label="Email address" class="login__input" style="margin-bottom:16px;" />
              <input type="text" placeholder="Subject" aria-label="Subject" class="login__input" style="margin-bottom:16px;" />
              <textarea placeholder="Your message" aria-label="Your message" class="login__input" style="margin-bottom:16px; min-height:120px; resize:vertical;"></textarea>
              <button type="submit" class="button --main" style="width:100%;">Send message</button>
            </form>
          </div>
          <div class="columns__item --half">
            <h2 class="title --medium" style="margin-bottom:32px;">Contact</h2>
            <div style="margin-bottom:24px;">
              <p class="title --small">Tom Becker</p>
              <p class="text" style="opacity:0.6;">Software Development<br>Remote — Germany</p>
            </div>
            <div>
              <p class="label">Email</p>
              <p class="text">kontakt@software-becker.com</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="component component--footer footer">
    <div class="container">
      <a href="/" class="logo footer__logo">
        <svg viewBox="0 0 109 34" width="109" height="34" style="color: var(--color-white);">
  <text x="0" y="25" font-family="'Inter', Helvetica, Arial, sans-serif" font-weight="700" font-size="24" fill="currentColor" letter-spacing="-0.5">BECKER</text>
</svg>
      </a>
      <div class="footer__links">
        <a href="/impressum.html">Impressum</a>
        <a href="/datenschutz.html">Datenschutz</a>
      </div>
      <div class="footer__contact">
        <span>M kontakt@software-becker.com</span>
      </div>
      <p class="footer__copyright">BECKER &copy; 2026</p>
    </div>
  </footer>
  <nav class="component component--menu menu"></nav>
  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
